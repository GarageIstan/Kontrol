<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<title>Montaj Kontrol</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 14px;
  margin: 0;
}

h2 {
  margin-top: 0;
}

.card {
  background: #1e293b;
  padding: 14px;
  margin-top: 12px;
  border-radius: 14px;
}

.question-card {
  background: #111827;
  border: 1px solid #334155;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
}

.question-title {
  font-weight: bold;
  margin-bottom: 10px;
  line-height: 1.35;
}

input, textarea {
  width: 100%;
  padding: 11px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
  box-sizing: border-box;
}
  .fullscreen-img {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.fullscreen-img img {
  max-width: 95%;
  max-height: 95%;
}

textarea {
  min-height: 70px;
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 11px 12px;

  cursor: pointer;
}

.choice-btn {
  flex: 1;
  background: #334155;
  color: white;

}

.choice-btn.selected-yes {
  background: #16a34a;
  border-color: #bbf7d0;

}

.choice-btn.selected-no {
  background: #dc2626;
  border-color: #fecaca;
  box-shadow: 0 0 0 3px rgba(239,68,68,.25);
}

.save {
  width: 100%;
  background: #22c55e;
  color: #052e16;
  font-size: 16px;
  margin-top: 14px;
}

.save:disabled {
  background: #64748b;
  color: #cbd5e1;
  cursor: not-allowed;
}

.status {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 6px;
}

.top-actions {
  position: sticky;
  bottom: 0;
  background: rgba(15,23,42,.95);
  padding: 10px 0;
}
  .photo-box {
  background: #111827;
  border: 1px solid #334155;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
}

.photo-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.photo-btn {
  flex: 1;
  min-width: 130px;
  background: #2563eb;
  color: white;
}

.preview-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.preview-item {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background: #020617;
  border: 1px solid #334155;
}

.preview-item img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  display: block;
}

.preview-item button {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 26px;
  height: 26px;
  padding: 0;
  border-radius: 50%;
  background: rgba(0,0,0,.7);
  color: white;
}

.signature-box {
  background: #111827;
  border: 1px solid #334155;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
}

.signature-pad {
  width: 100%;
  height: 170px;
  background: white;
  border-radius: 10px;
  display: block;
  touch-action: none;
}

.small-btn-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.small-btn-row button {
  flex: 1;
  background: #334155;
  color: white;
}

@media (max-width: 480px) {
  .preview-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

.tab-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(15,23,42,.96);
  padding: 8px 0 12px;
  margin-bottom: 8px;
}

.tab-btn {
  background: #334155;
  color: white;
  border: 2px solid transparent;
}

.tab-btn.active {
  background: #2563eb;
  border-color: #93c5fd;
  box-shadow: 0 0 0 3px rgba(37,99,235,.25);
}

.page {
  display: none;
}

.page.active {
  display: block;
}

.list-card {
  background: #111827;
  border: 1px solid #334155;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 14px;
}

.list-card b {
  display: block;
  margin-bottom: 5px;
}

.list-meta {
  color: #94a3b8;
  font-size: 12px;
  line-height: 1.45;
}

.list-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.list-actions button {
  flex: 1;
  background: #2563eb;
  color: white;
}

.search-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.search-row input {
  flex: 1;
}

.search-row button {
  background: #2563eb;
  color: white;
  white-space: nowrap;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.72);
  z-index: 999;
  display: none;
  padding: 18px;
  overflow-y: auto;
}

.modal {
  max-width: 760px;
  margin: 20px auto;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 18px;
  padding: 14px;
  color: white;
}

.modal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.modal-head button {
  width: auto;
  background: #334155;
  color: white;
}

.detail-section {
  background: #111827;
  border: 1px solid #334155;
  border-radius: 14px;
  padding: 12px;
  margin-top: 12px;
}

.sign-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.sign-box {
  text-align: center;
}

.sign-img {
  max-height: 130px;
  object-fit: contain;
}

  @media print {
  body * {
    visibility: hidden;
  }

  #printArea, #printArea * {
    visibility: visible;
  }

  #printArea {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
  }
    #printArea {
  font-size: 9px;
  line-height: 1.25;
}
    

#printArea h4 {
  margin: 4px 0;
  font-size: 11px;
}
#printArea .sign-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 6px;
}

#printArea .sign-box {
  text-align: center;
}

#printArea .sign-box b {
  display: block;
  font-size: 9px;
  margin-bottom: 4px;
}

#printArea .sign-box img {
  max-height: 70px;
  object-fit: contain;
}
#printArea .detail-section {
  padding: 5px;
  margin-top: 5px;
  border-radius: 6px;
}

#printArea .detail-item {
  padding: 3px 0;
  font-size: 8px;
}

#printArea .detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}

#printArea .detail-img {
  max-height: 55px;
  object-fit: cover;
  border-radius: 4px;
}

/* İmza görselleri daha okunaklı kalsın */
#printArea .detail-section:last-child .detail-img {
  max-height: 90px;
  object-fit: contain;
}
    #printArea {
  display: block !important;
  visibility: visible !important;
  background: white !important;
  color: black !important;
}

#printArea * {
  visibility: visible !important;
}

  @page {
    size: A5 portrait;
    margin: 5mm;
  }
#printArea button {
  display: none !important;
}
}
    
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.detail-img {
  width: 100%;
  border-radius: 12px;
  border: 1px solid #334155;
  background: #020617;
}
  

.detail-item {
  border-bottom: 1px solid #334155;
  padding: 8px 0;
  font-size: 13px;
}

.detail-item:last-child {
  border-bottom: none;
}

.answer-evet {
  color: #86efac;
  font-weight: bold;
}

.answer-hayir {
  color: #fca5a5;
  font-weight: bold;
}

@media (max-width: 480px) {
  .search-row {
    flex-direction: column;
  }

  .search-row button {
    width: 100%;
  }

  .detail-grid {
    grid-template-columns: 1fr;
  }
}

<body>

<h2>Montaj Kontrol Formu</h2>

<div class="tab-bar">
  <button id="tabAdd" class="tab-btn active" onclick="showPage('add')">Kayıt Ekle</button>
  <button id="tabList" class="tab-btn" onclick="showPage('list')">Kayıtlar</button>
</div>

<div id="pageAdd" class="page active">
  <div class="card">
    <input id="workOrder" placeholder="İş Emri No">
    <input id="plate" placeholder="Plaka">
    <input id="customer" placeholder="Müşteri Adı">
    <input id="brandModel" placeholder="Araç Model">
    <input id="technicianName" placeholder="Usta Adı">
  </div>

  <div class="card">
    <h3>Araç Öncesi Fotoğraflar</h3>
    <div class="photo-box">
      <div class="photo-row">
        <button class="photo-btn" onclick="document.getElementById('beforeInput').click()">+ Öncesi Foto Ekle</button>
      </div>
      <input id="beforeInput" type="file" accept="image/*" capture="environment" multiple hidden>
      <div id="beforePreview" class="preview-grid"></div>
    </div>
  </div>

  <div class="card">
    <h3>Kontrol Listesi</h3>
    <div id="checklist"></div>
  </div>

  <div class="card">
    <h3>Araç Sonrası Fotoğraflar</h3>
    <div class="photo-box">
      <div class="photo-row">
        <button class="photo-btn" onclick="document.getElementById('afterInput').click()">+ Sonrası Foto Ekle</button>
      </div>
      <input id="afterInput" type="file" accept="image/*" capture="environment" multiple hidden>
      <div id="afterPreview" class="preview-grid"></div>
    </div>
  </div>

  <div class="card">
    <h3>İmzalar</h3>

    <div class="signature-box">
      <b>Montaj Ustası İmza</b>
      <canvas id="techSignature" class="signature-pad"></canvas>
      <div class="small-btn-row">
        <button onclick="clearSignature('techSignature')">Temizle</button>
      </div>
    </div>

    <div class="signature-box">
      <b>Kontrol Eden İmza</b>
      <canvas id="controllerSignature" class="signature-pad"></canvas>
      <div class="small-btn-row">
        <button onclick="clearSignature('controllerSignature')">Temizle</button>
      </div>
    </div>
  </div>

  <div class="top-actions">
    <button id="saveBtn" class="save" onclick="save()">Kaydı Kaydet</button>
    <div id="saveStatus" class="status"></div>
  </div>
</div>

<div id="pageList" class="page">
  <div class="card">
    <h3>Kayıtlar</h3>

    <div class="search-row">
      <input id="searchInput" placeholder="Plaka, müşteri veya araç modeli ara">
      <button onclick="searchRecords()">Ara</button>
    </div>

    <button style="background:#334155;color:white;margin-top:8px;" onclick="loadTodayRecords()">Bugünkü Kayıtları Getir</button>
    <button style="background:#b91c1c;color:white;margin-top:8px;" onclick="deleteTestRecords()">TEST Kayıtlarını Temizle</button>

    <div id="recordsList" style="margin-top:12px;"></div>
  </div>
</div>

<div id="detailModal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-head">
      <h3 style="margin:0;">Kayıt Detayı</h3>
      <button onclick="closeDetail()">Kapat</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw2TKbY0S56gHEv4OEeu05_mwAtEg-Vibmc7Skxt1L5yVVYNgK68t5naMmxV1BiusJw2Q/exec";
const SUPABASE_URL = "https://votjqjtkimbffugetpmx.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_1-IwVJl7wJUsnNybjKeLfA_hbTISvpj";
let editMode = false;
let editingId = null;
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PHOTO_BUCKET = "checklist-photos";
const SIGNATURE_BUCKET = "checklist-signatures";
const items = [
  "İş emri ile araç plakası uyumlu mu?",
  "Müşteri şikayetleri ve özel istekler not edilmiş mi?",
  "Araç içi/dışı mevcut hasar kayıtları kontrol edildi mi?",
  "Montajı yapılan aksesuarların yerleşimi simetrik ve nizami mi?",
  "Sabitleme elemanları sağlam mı?",
  "Gövde ile aksesuar arasında boşluk veya kasılma var mı?",
  "Hareketli parçaların çalışmasına engel bir durum var mı?",
  "Kablo tesisatı uygun ve izole edilmiş mi?",
  "Elektrikli aksesuarların fonksiyonları tam mı?",
  "Sigorta değerleri ve bağlantı noktaları kontrol edildi mi?",
  "Gösterge panelinde arıza lambası yanıyor mu?",
  "Montaj sonrası temizlik yapıldı mı?",
  "Araç yüzeyinde yeni çizik veya deformasyon var mı?",
  "Koruyucu kılıflar çıkarıldı mı?",
  "Garanti belgeleri ve kullanım kılavuzları hazırlandı mı?",
  "Değişen veya çıkan eski parçalar müşteriye hazırlanmış mı?"
];

const state = {
  answers: {},
  beforePhotos: [],
  afterPhotos: [],
  existingBeforePhotoPaths: [],
  existingAfterPhotoPaths: [],
  existingTechnicianSignaturePath: "",
  existingControllerSignaturePath: ""
};

let saving = false;

function init() {
  const container = document.getElementById("checklist");
  container.innerHTML = "";

  items.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "question-card";

    div.innerHTML = `
      <div class="question-title">${i + 1}. ${item}</div>

      <div class="btn-row">
        <button id="yes-${i}" class="choice-btn" onclick="setVal(${i}, 'Evet')">Evet</button>
        <button id="no-${i}" class="choice-btn" onclick="setVal(${i}, 'Hayır')">Hayır</button>
      </div>

      <textarea id="note-${i}" placeholder="Açıklama"></textarea>
    `;

    container.appendChild(div);
  });
}
  function openImage(url) {
  const div = document.createElement("div");
  div.className = "fullscreen-img";
  div.innerHTML = `<img src="${url}">`;

  div.onclick = () => div.remove();

  document.body.appendChild(div);
}

function setVal(i, val) {
state.answers[i] = val;

  const yesBtn = document.getElementById("yes-" + i);
  const noBtn = document.getElementById("no-" + i);

  yesBtn.classList.remove("selected-yes");
  noBtn.classList.remove("selected-no");

  if (val === "Evet") {
    yesBtn.classList.add("selected-yes");
  }

  if (val === "Hayır") {
    noBtn.classList.add("selected-no");
  }
}

function getChecklist() {
  return items.map((item, i) => ({
    label: item,
 answer: state.answers[i] || "",
    note: document.getElementById("note-" + i).value.trim()
  }));
}

function normalizePlate(value) {
  return String(value || "")
    .toLocaleUpperCase("tr-TR")
    .replace(/\s+/g, "")
    .replace(/-/g, "")
    .trim();
}

async function checkDuplicatePlate(plate) {
  const q = encodeURIComponent(plate);

  const res = await fetch(API_URL + "?action=searchAllRecords&q=" + q);
  const data = await res.json();

  if (!data.ok) return [];

  const currentPlate = normalizePlate(plate);

  return (data.records || []).filter(r => {
    return normalizePlate(r.Plaka) === currentPlate;
  });
}

async function save() {
  if (saving) return;
// eksik kontrol
const checklistData = getChecklist();
const boslar = checklistData.filter(x => !x.answer).length;

if (boslar > 0) {
  const devam = confirm(`${boslar} adet cevap boş. Yine de kaydetmek istiyor musun?`);
  if (!devam) return;
}
  const saveBtn = document.getElementById("saveBtn");
  const saveStatus = document.getElementById("saveStatus");

  const plate = document.getElementById("plate").value.trim();

  if (!plate) {
    alert("Plaka boş olamaz knk.");
    return;
  }

  saving = true;
  saveBtn.disabled = true;
  saveBtn.textContent = "Kontrol ediliyor...";
  saveStatus.textContent = "Aynı plaka kontrol ediliyor...";

  try {
    const duplicates = await checkDuplicatePlate(plate);

    if (duplicates.length > 0) {
      const devam = confirm(
        "Bu plakaya ait daha önce kayıt mevcut.\n\n" +
        "Kayıt sayısı: " + duplicates.length + "\n\n" +
        "Yine de devam edilsin mi?"
      );

      if (!devam) {
        saveStatus.textContent = "Kayıt iptal edildi.";
        return;
      }
    }

    saveBtn.textContent = "Kaydediliyor...";
    saveStatus.textContent = "Kayıt Sheets'e gönderiliyor...";
const recordId = editMode ? editingId : "CHK-" + Date.now();

saveBtn.textContent = "Fotoğraflar yükleniyor...";
saveStatus.textContent = "Supabase Storage'a fotoğraf ve imzalar yükleniyor...";

const newBeforePhotoPaths = await uploadPhotoGroup(recordId, "before", state.beforePhotos);
const newAfterPhotoPaths = await uploadPhotoGroup(recordId, "after", state.afterPhotos);

const beforePhotoPaths = [...state.existingBeforePhotoPaths, ...newBeforePhotoPaths];
const afterPhotoPaths = [...state.existingAfterPhotoPaths, ...newAfterPhotoPaths];

let technicianSignaturePath = await uploadSignature(recordId, "techSignature", "technician");
let controllerSignaturePath = await uploadSignature(recordId, "controllerSignature", "controller");

if (!technicianSignaturePath && editMode) technicianSignaturePath = state.existingTechnicianSignaturePath || "";
if (!controllerSignaturePath && editMode) controllerSignaturePath = state.existingControllerSignaturePath || "";

    const payload = {
      IsEmriNo: document.getElementById("workOrder").value.trim(),
      plate: plate,
      customerName: document.getElementById("customer").value.trim(),
      vehicleModel: document.getElementById("brandModel").value.trim(),
      technicianName: document.getElementById("technicianName").value.trim(),
      checklist: getChecklist(),
      id: recordId,
beforePhotoCount: beforePhotoPaths.length,
afterPhotoCount: afterPhotoPaths.length,
beforePhotoPaths: beforePhotoPaths,
afterPhotoPaths: afterPhotoPaths,
technicianSignaturePath: technicianSignaturePath,
controllerSignaturePath: controllerSignaturePath,
      status: "Tamamlandi"
    };

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: editMode ? "updateChecklistRecord" : "addChecklistRecord",
        payload
      })
    });

    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || "Kayıt başarısız");
    }

    saveBtn.textContent = "Kaydedildi ✅";
    saveStatus.textContent = "Kayıt başarılı. ID: " + data.record.ID;

  resetForm();
saveStatus.textContent = "Form temizlendi. Yeni kayıt girebilirsin.";
setTimeout(() => {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}, 100);
  } catch (e) {
    alert("Hata: " + e.message);
    saveStatus.textContent = "Hata: " + e.message;
  } finally {
    setTimeout(() => {
      saving = false;
      saveBtn.disabled = false;
      saveBtn.textContent = "Kaydı Kaydet";
    }, 1200);
  }
  editMode = false;
editingId = null;
}

function showPage(page) {
  const isAdd = page === "add";

  document.getElementById("pageAdd").classList.toggle("active", isAdd);
  document.getElementById("pageList").classList.toggle("active", !isAdd);
  document.getElementById("tabAdd").classList.toggle("active", isAdd);
  document.getElementById("tabList").classList.toggle("active", !isAdd);

  if (!isAdd) loadTodayRecords();

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function parseJsonMaybe(value, fallback) {
  if (!value) return fallback;

  if (Array.isArray(value)) return value;

  if (typeof value === "string") {
    try {
      const parsed = JSON.parse(value);
      if (Array.isArray(parsed)) return parsed;
    } catch (e) {}

    // fallback: string içinde link varsa yakala
    if (value.includes("http")) {
      return value
        .replaceAll('"', "")
        .replaceAll("[", "")
        .replaceAll("]", "")
        .split(",")
        .map(x => x.trim())
        .filter(x => x.startsWith("http"));
    }
  }

  return fallback;
}

function formatDateTR(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return String(dateStr);
  return d.toLocaleString("tr-TR", {
    timeZone: "Europe/Istanbul",
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function shortText(value) {
  return String(value || "-");
}

function renderRecords(records) {
  const container = document.getElementById("recordsList");

  if (!records || !records.length) {
    container.innerHTML = '<div class="list-meta">Kayıt bulunamadı.</div>';
    return;
  }

  container.innerHTML = records.map(r => {
    return `
      <div class="list-card">
        <b>${shortText(r.Plaka)} - ${shortText(r.AracModel)}</b>
        <div class="list-meta">
          Tarih: ${formatDateTR(r.TarihSaat)}<br>
          Müşteri: ${shortText(r.MusteriAdi)}<br>
          İş Emri: ${shortText(r.IsEmriNo)}<br>
          Durum: ${shortText(r.Durum)}
        </div>
        <div class="list-actions">
          <button onclick="openDetail('${r.ID}')">Detay Aç</button>
          <button style="background:#f59e0b;" onclick="editRecord('${r.ID}')">Düzenle</button>
          <button style="background:#dc2626;" onclick="deleteRecord('${r.ID}', this)">Sil</button>
        </div>
      </div>
    `;
  }).join("");
}

async function loadTodayRecords() {
  const container = document.getElementById("recordsList");
  container.innerHTML = '<div class="list-meta">Bugünkü kayıtlar yükleniyor...</div>';

  try {
    const res = await fetch(API_URL + "?action=listTodayRecords");

function setupSignaturePad(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#111827";
  }

  resizeCanvas();

  let drawing = false;
  let lastX = 0;
  let lastY = 0;

  function pos(e) {
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }

  function start(e) {
    drawing = true;
    const p = pos(e);
    lastX = p.x;
    lastY = p.y;
  }

  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x;
    lastY = p.y;
  }

  function end() {
    drawing = false;
  }

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);
}

function clearSignature(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function canvasToBlob(canvasId) {
  return new Promise(resolve => {
    const canvas = document.getElementById(canvasId);
    canvas.toBlob(blob => resolve(blob), "image/png", 0.9);
  });
}

function safeName(name) {
  return String(name || "file")
    .toLocaleLowerCase("tr-TR")
    .replaceAll("ı", "i")
    .replaceAll("ğ", "g")
    .replaceAll("ü", "u")
    .replaceAll("ş", "s")
    .replaceAll("ö", "o")
    .replaceAll("ç", "c")
    .replace(/[^a-z0-9.]+/g, "-")
    .replace(/-+/g, "-");
}

async function uploadOneFile(bucket, path, file) {
  const { error } = await supabaseClient.storage
    .from(bucket)
    .upload(path, file, { cacheControl: "3600", upsert: true });

  if (error) throw new Error(error.message);

  const { data } = supabaseClient.storage.from(bucket).getPublicUrl(path);
  return { path, url: data.publicUrl };
}

async function uploadPhotoGroup(checklistId, type, files) {
  const paths = [];

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const fileName = `${Date.now()}-${i + 1}-${safeName(file.name || "foto.jpg")}`;
    const path = `${checklistId}/${type}/${fileName}`;
    const uploaded = await uploadOneFile(PHOTO_BUCKET, path, file);
    paths.push(uploaded.url);
  }

  return paths;
}

async function uploadSignature(checklistId, canvasId, name) {
  const blob = await canvasToBlob(canvasId);

  if (!blob || blob.size < 1000) return "";

  const path = `${checklistId}/${name}.png`;
  const uploaded = await uploadOneFile(SIGNATURE_BUCKET, path, blob);
  return uploaded.url;
}
 async function deleteRecord(id, btn, silent = false) {
  const ok = silent ? true : confirm("Bu kaydı silmek istediğine emin misin?");
  if (!ok) return;

  const oldText = btn ? btn.textContent : "";
  if (btn) {
    btn.disabled = true;
    btn.textContent = "Siliniyor...";
    btn.style.background = "#64748b";
  }

  try {
    const resDetail = await fetch(API_URL + "?action=getRecordById&id=" + encodeURIComponent(id));
    const detailData = await resDetail.json();

    if (!detailData.ok || !detailData.record) {
      throw new Error("Kayıt detayı alınamadı");
    }

    const r = detailData.record;

    const beforePhotos = parseJsonMaybe(r.OnceFotoPaths, []);
    const afterPhotos = parseJsonMaybe(r.SonraFotoPaths, []);
    const techSign = r.UstaImzaPath ? [r.UstaImzaPath] : [];
    const controlSign = r.KontrolImzaPath ? [r.KontrolImzaPath] : [];

    function urlToPath(url) {
      const marker = "/storage/v1/object/public/";
      const idx = String(url).indexOf(marker);
      if (idx === -1) return null;

      const rest = String(url).slice(idx + marker.length);
      const parts = rest.split("/");

      // ilk parça bucket adı, onu çıkarıyoruz
      parts.shift();

      return parts.join("/");
    }

    const photoPaths = [...beforePhotos, ...afterPhotos].map(urlToPath).filter(Boolean);
    const signPaths = [...techSign, ...controlSign].map(urlToPath).filter(Boolean);

    if (photoPaths.length) {
      const { error } = await supabaseClient.storage
        .from("checklist-photos")
        .remove(photoPaths);

      if (error) throw new Error("Foto silme hatası: " + error.message);
    }

    if (signPaths.length) {
      const { error } = await supabaseClient.storage
        .from("checklist-signatures")
        .remove(signPaths);

      if (error) throw new Error("İmza silme hatası: " + error.message);
    }

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "deleteChecklistRecord",
        id
      })
    });

    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || "Silme başarısız");
    }

    if (!silent) {
      alert("Kayıt + foto + imzalar silindi ✅");
      await loadTodayRecords();
    }

  } catch (e) {
    alert("Silme hatası: " + e.message);

    if (btn) {
      btn.disabled = false;
      btn.textContent = oldText || "Sil";
      btn.style.background = "#dc2626";
    }
  }
}

async function deleteTestRecords() {
  const ok = confirm("Tüm TEST kayıtları ve bağlı Supabase dosyaları silinecek. Emin misin?");
  if (!ok) return;

  const container = document.getElementById("recordsList");
  container.innerHTML = '<div class="list-meta">TEST kayıtları aranıyor...</div>';

  try {
    const res = await fetch(API_URL + "?action=searchAllRecords&q=TEST");
    const data = await res.json();

    if (!data.ok) throw new Error(data.error || "TEST kayıtları alınamadı");

    const records = (data.records || []).filter(r =>
      String(r.Plaka || "").toLocaleUpperCase("tr-TR").includes("TEST")
    );

    if (!records.length) {
      container.innerHTML = '<div class="list-meta">Silinecek TEST kaydı bulunamadı.</div>';
      return;
    }

    let deleted = 0;

    for (const r of records) {
      container.innerHTML = `<div class="list-meta">Siliniyor: ${deleted + 1}/${records.length} - ${r.Plaka || r.ID}</div>`;
      await deleteRecord(r.ID, null, true);
      deleted++;
    }

    alert(`${deleted} TEST kaydı temizlendi ✅`);
    await loadTodayRecords();

  } catch (e) {
    alert("TEST temizleme hatası: " + e.message);
    await loadTodayRecords();
  }
}
